
services:
  - type: worker
    name: keight-deployment-worker
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: WORKSPACE_DIR
        value: /tmp/deployments
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    disk:
      name: worker-storage
      mountPath: /tmp/deployments
      sizeGB: 10
